<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --bg: #0a0f1c;
        --panel: rgba(255, 255, 255, 0.04);
        --fg: #f2f6ff;
        --muted: #9fb0cc;
        --subtle: #6b7a98;
        --accent: #38bdf8;
        --accent2: #6366f1;
        --border: rgba(255, 255, 255, 0.09);
        --fill: rgba(255, 255, 255, 0.05);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 320px;
        font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
        background:
          radial-gradient(120% 80% at 100% 0%, rgba(56, 189, 248, 0.12), transparent 60%),
          radial-gradient(120% 80% at 0% 0%, rgba(99, 102, 241, 0.12), transparent 55%),
          var(--bg);
        color: var(--fg);
      }
      .header {
        display: flex; align-items: center; gap: 9px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--border);
      }
      .brand {
        width: 28px; height: 28px; border-radius: 9px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; color: #04122a; font-size: 14px;
        box-shadow: 0 4px 14px rgba(56, 189, 248, 0.35);
      }
      .title { font-size: 14px; font-weight: 700; letter-spacing: .2px; }
      .sub { font-size: 11px; color: var(--subtle); margin-top: 1px; }
      .status {
        margin-left: auto; display: flex; align-items: center; gap: 6px;
        font-size: 11px; color: var(--muted);
        padding: 4px 9px; border: 1px solid var(--border);
        border-radius: 999px; background: var(--fill);
      }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--subtle); }
      .dot.on { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.7); }
      .dot.off { background: #f43f5e; }

      .toggleRow {
        display: flex; align-items: center; gap: 10px;
        margin: 14px; padding: 13px;
        border: 1px solid var(--border); border-radius: 14px;
        background: var(--panel);
      }
      .toggleRow .tx { display: flex; flex-direction: column; }
      .toggleRow .tt { font-size: 13px; font-weight: 700; }
      .toggleRow .td { font-size: 11px; color: var(--subtle); margin-top: 2px; }
      .switch {
        margin-left: auto; cursor: pointer; user-select: none;
        width: 116px; height: 34px; border-radius: 999px;
        border: 1px solid var(--border); background: var(--fill);
        position: relative; transition: all .18s; flex: none;
      }
      .switch .knob {
        position: absolute; top: 3px; left: 3px; height: 26px;
        min-width: 64px; padding: 0 10px; border-radius: 999px;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 800; color: var(--muted);
        background: rgba(255,255,255,0.06); transition: all .18s;
      }
      .switch.on { background: linear-gradient(135deg, rgba(56,189,248,0.28), rgba(99,102,241,0.28)); border-color: rgba(56,189,248,0.5); }
      .switch.on .knob { left: calc(100% - 67px); color: #eaf6ff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }

      .hint {
        margin: 0 14px 14px; padding: 10px 12px;
        font-size: 11.5px; line-height: 1.6; color: var(--muted);
        border: 1px solid var(--border); border-radius: 12px;
        background: var(--fill);
      }
      .hint b { color: var(--fg); font-weight: 700; }

      .footer {
        padding: 11px 14px 13px; border-top: 1px solid var(--border);
        display: flex; align-items: center; gap: 14px;
      }
      .link { font-size: 12px; color: var(--muted); cursor: pointer; }
      .link:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="brand">L</div>
      <div>
        <div class="title">Lumen</div>
        <div class="sub">下载接管</div>
      </div>
      <div class="status"><span id="dot" class="dot"></span><span id="statusText">检测中…</span></div>
    </div>

    <div class="toggleRow">
      <div class="tx">
        <span class="tt">接管浏览器下载</span>
        <span class="td">下载自动交给 Lumen 多线程下载</span>
      </div>
      <div id="intercept" class="switch"><span class="knob">接管中</span></div>
    </div>

    <div id="hint" class="hint"></div>

    <div class="footer">
      <span id="openOptions" class="link">设置</span>
      <span id="openRecords" class="link">下载记录</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
