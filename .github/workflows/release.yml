name: Build & Release

# Builds the macOS (.dmg) and Windows (installer + zip) artifacts.
#   * Push a tag like `v1.0.0`  -> builds and publishes a GitHub Release.
#   * Manual "Run workflow"     -> builds and uploads downloadable artifacts.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------- macOS ----
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Package .dmg
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Lumen.app"
          mkdir -p dist/dmg
          cp -R "$APP" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Lumen" -srcfolder dist/dmg \
            -ov -format UDZO dist/Lumen-macOS.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumen-macOS
          path: dist/Lumen-macOS.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Lumen-macOS.dmg

  # --------------------------------------------------------------- Windows ----
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Package .zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath dist/Lumen-Windows.zip -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows/installer.iss

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lumen-Windows
          path: |
            dist/Lumen-Windows.zip
            dist/Lumen-Windows-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Lumen-Windows.zip
            dist/Lumen-Windows-Setup.exe
