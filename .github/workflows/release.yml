name: Release

# Cut a versioned release: push a tag like `v1.2.0`.
#   -> creates the GitHub Release, builds macOS/Windows assets, and attaches
#      the matching browser-extension zip.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "Lumen $tag" --generate-notes
          fi

  # macOS .dmg + Windows installer/zip
  assets:
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      release_tag: ${{ github.ref_name }}

  # Browser extension zip, attached to the same versioned release
  extension:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: |
          cd browser_extension
          zip -r ../Lumen-Extension.zip . -x '*.DS_Store'

      - name: Attach extension to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" Lumen-Extension.zip \
            --repo "$GITHUB_REPOSITORY" --clobber
