name: Build (reusable)

# Reusable build for the desktop app assets. Builds the macOS .dmg and the
# Windows .zip + Inno Setup installer, then uploads them to an existing
# GitHub Release identified by `release_tag` (the caller creates the release).
on:
  workflow_call:
    inputs:
      release_tag:
        description: Tag of an existing GitHub Release to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Package .dmg
        run: |
          set -e
          APP="build/macos/Build/Products/Release/Lumen.app"
          mkdir -p dist/dmg
          cp -R "$APP" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Lumen" -srcfolder dist/dmg \
            -ov -format UDZO dist/Lumen-macOS.dmg

      - name: Upload macOS asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/Lumen-macOS.dmg \
            "scripts/macOS-无法打开请运行.command" \
            --repo "$GITHUB_REPOSITORY" --clobber

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      # Zero-install: Flutter's flutter_windows.dll (and the MSVC-built runner)
      # dynamically link the VC++ 2015–2022 runtime. A clean machine without the
      # "VC++ Redistributable" would crash on launch with a missing-DLL error, so
      # we copy the redistributable CRT DLLs next to the .exe. Done before both
      # the .zip and the installer package from the same Release folder.
      - name: Bundle VC++ runtime (zero-install)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rel = "build/windows/x64/runner/Release"
          $copied = @{}

          # Prefer the official VS redistributable copies (Microsoft.VC14x.CRT).
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $vs = & $vswhere -latest -products * -property installationPath
            if ($vs) {
              $redistRoot = Join-Path $vs 'VC\Redist\MSVC'
              $ver = Get-ChildItem -Path $redistRoot -Directory -ErrorAction SilentlyContinue |
                     Sort-Object Name -Descending | Select-Object -First 1
              if ($ver) {
                $crt = Get-ChildItem -Path $ver.FullName -Recurse -Directory -Filter 'Microsoft.VC*.CRT' -ErrorAction SilentlyContinue |
                       Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1
                if ($crt) {
                  Get-ChildItem -Path $crt.FullName -Filter *.dll | ForEach-Object {
                    Copy-Item $_.FullName $rel -Force
                    $copied[$_.Name] = $true
                  }
                }
              }
            }
          }

          # Fallback: pull anything still missing straight from System32 (these
          # are the redistributable Microsoft runtime DLLs).
          $required = @('msvcp140.dll','vcruntime140.dll','vcruntime140_1.dll')
          $optional = @('msvcp140_1.dll','msvcp140_2.dll','concrt140.dll','vccorlib140.dll')
          foreach ($n in ($required + $optional)) {
            if (-not $copied.ContainsKey($n)) {
              $sys = Join-Path $env:WINDIR "System32\$n"
              if (Test-Path $sys) { Copy-Item $sys $rel -Force; $copied[$n] = $true }
            }
          }

          Write-Host "Bundled runtime DLLs:"
          Get-ChildItem $rel -Filter *140*.dll | Select-Object -ExpandProperty Name | Write-Host
          # Fail loudly rather than shipping a zip that won't launch on a clean box.
          foreach ($n in $required) {
            if (-not (Test-Path (Join-Path $rel $n))) { throw "Missing required runtime DLL: $n" }
          }

      - name: Package .zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath dist/Lumen-Windows.zip -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows/installer.iss
          # With SourceDir=.. the installer is written to dist/, but locate it
          # defensively and copy into dist/ only if it isn't already there.
          $exe = Get-ChildItem -Recurse -Filter Lumen-Windows-Setup.exe |
                 Select-Object -First 1
          if (-not $exe) { throw "Installer exe not found after ISCC" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dest = Join-Path (Resolve-Path dist).Path "Lumen-Windows-Setup.exe"
          if ($exe.FullName -ne $dest) { Copy-Item $exe.FullName $dest -Force }

      - name: Upload Windows assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/Lumen-Windows.zip dist/Lumen-Windows-Setup.exe \
            --repo "$GITHUB_REPOSITORY" --clobber
