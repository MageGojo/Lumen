name: ✨ 功能建议
description: 希望 Lumen 新增或改进的能力
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: 想要的功能
      description: 你希望 Lumen 能做什么?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 它能解决什么问题
      description: 你现在遇到的痛点 / 使用场景。
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / 参考
      description: 现在你是怎么绕过的?有没有同类产品的实现可参考?
    validations:
      required: false
